<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>대나무 숲</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="audience-body" data-page="audience">
  <main class="audience-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">익명 채팅방</p>
        <h1>대나무 숲</h1>
      </div>
      <span class="status-pill compact" id="sessionStatus">대기 중</span>
    </header>

    <button class="new-message-alert" id="newMessageAlert" type="button" hidden>새 대화가 도착했습니다</button>

    <section class="audience-guide" aria-live="polite">
      <strong id="countdownText">곧 시작됩니다</strong>
    </section>

    <ol class="chat-stream audience-stream" id="messageList"></ol>

    <form class="composer-bar" id="composerForm" autocomplete="off">
      <textarea id="composerInput" rows="1" placeholder="메시지를 입력하세요"></textarea>
      <button type="submit" disabled>전송</button>
    </form>
  </main>

  <template id="messageTemplate">
    <li class="chat-message">
      <div class="message-heading">
        <span class="actor"></span>
        <span class="member-status"></span>
        <span class="handle"></span>
        <time class="message-time"></time>
      </div>
      <p class="message-text"></p>
    </li>
  </template>

  <script src="./app.js"></script>
</body>
</html>
