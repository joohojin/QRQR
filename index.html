<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>대나무 숲</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="audience-body" data-page="audience">
  <main class="audience-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">익명 채팅방</p>
        <h1>대나무 숲</h1>
      </div>
      <span class="status-pill compact" id="sessionStatus">대기 중</span>
    </header>

    <section class="audience-guide" aria-live="polite">
      <strong id="countdownText">곧 시작됩니다</strong>
      <span>올라오는 대화에만 이모지 반응을 선택할 수 있습니다.</span>
    </section>

    <ol class="chat-stream audience-stream" id="messageList"></ol>
  </main>

  <template id="messageTemplate">
    <li class="chat-message">
      <div class="message-heading">
        <span class="actor"></span>
        <span class="handle"></span>
        <time class="message-time"></time>
      </div>
      <p class="message-text"></p>
      <div class="reaction-area audience-reactions" aria-label="이모지 반응"></div>
    </li>
  </template>

  <script src="./app.js"></script>
</body>
</html>
